<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — TaskFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../dist/css/style.css">
</head>
<body>

<main class="auth">

  <!-- LEFT: live board panel (laptop only) -->
  <aside class="auth-visual">
    <a href="index.html" class="navbar-brand">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M2 17 C 7 17, 7 5, 12 5 C 17 5, 17 17, 20 17" stroke="#FFB454" stroke-width="1.6" fill="none"/>
        <circle cx="2" cy="17" r="1.8" fill="#7FE7C4"/>
        <circle cx="12" cy="5" r="1.8" fill="#F5F3EA"/>
        <circle cx="20" cy="17" r="1.8" fill="#FFB454"/>
      </svg>
      TaskFlow
    </a>

    <div class="auth-visual-copy">
  <h2 class="auth-quote">Every task, <em>back in motion.</em></h2>
  <p class="auth-visual-sub">Sign in and your board is live again — To&nbsp;Do, In&nbsp;Progress, Done, exactly where your team left it.</p>
</div>

    <div class="flow-stage">
      <svg viewBox="0 0 420 300">
        <rect class="svg-col-plate" x="10" y="10" width="126" height="280" rx="10"/>
        <rect class="svg-col-plate" x="147" y="10" width="126" height="280" rx="10"/>
        <rect class="svg-col-plate" x="284" y="10" width="126" height="280" rx="10"/>

        <text class="svg-col-label" x="26" y="36">TO DO</text>
        <text class="svg-col-label" x="163" y="36">IN PROGRESS</text>
        <text class="svg-col-label" x="300" y="36">DONE</text>

        <rect class="svg-card" x="26" y="52" width="94" height="42" rx="7"/>
        <line class="svg-card-line" x1="38" y1="66" x2="104" y2="66"/>
        <line class="svg-card-line" x1="38" y1="78" x2="86" y2="78"/>

        <rect class="svg-card" x="26" y="106" width="94" height="42" rx="7"/>
        <line class="svg-card-line" x1="38" y1="120" x2="98" y2="120"/>
        <line class="svg-card-line" x1="38" y1="132" x2="80" y2="132"/>

        <rect class="svg-card svg-card-done" x="300" y="52" width="94" height="42" rx="7"/>
        <line class="svg-card-line" x1="312" y1="66" x2="378" y2="66" opacity="0.35"/>
        <line class="svg-card-line" x1="312" y1="78" x2="360" y2="78" opacity="0.35"/>

        <rect class="svg-card svg-card-done" x="300" y="106" width="94" height="42" rx="7"/>
        <line class="svg-card-line" x1="312" y1="120" x2="378" y2="120" opacity="0.35"/>
        <line class="svg-card-line" x1="312" y1="132" x2="356" y2="132" opacity="0.35"/>

        <g class="mover">
          <rect x="0" y="0" width="94" height="42" rx="7" fill="var(--card)" stroke="var(--amber)" stroke-width="1.4"/>
          <line x1="12" y1="14" x2="70" y2="14" stroke="#FFB454" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
          <line x1="12" y1="26" x2="50" y2="26" stroke="#FFB454" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
        </g>
      </svg>
    </div>
  </aside>

  <!-- RIGHT: login card -->
  <div class="auth-card">
    <a href="index.html" class="auth-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back to home
    </a>

    <a href="index.html" class="navbar-brand auth-brand">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M2 17 C 7 17, 7 5, 12 5 C 17 5, 17 17, 20 17" stroke="#FFB454" stroke-width="1.6" fill="none"/>
        <circle cx="2" cy="17" r="1.8" fill="#7FE7C4"/>
        <circle cx="12" cy="5" r="1.8" fill="#F5F3EA"/>
        <circle cx="20" cy="17" r="1.8" fill="#FFB454"/>
      </svg>
      TaskFlow
    </a>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to pick up where your team left off.</p>

    <form class="auth-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" required>
      </div>

      <div class="field">
  <label for="password">Password</label>
  <div class="field-password">
    <input type="password" id="password" placeholder="••••••••" required>
    <button type="button" class="password-toggle" data-password-toggle aria-label="Show password">
      <svg class="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <svg class="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.9 17.9A10.6 10.6 0 0 1 12 19c-6.5 0-10-7-10-7a18.3 18.3 0 0 1 5.1-5.9m3.2-1.5A10.6 10.6 0 0 1 12 5c6.5 0 10 7 10 7a18.3 18.3 0 0 1-2.2 3.2M1 1l22 22"/>
      </svg>
    </button>
  </div>
</div>

      <label class="auth-remember">
        <input type="checkbox" class="checkbox">
        <span>Remember me for 30 days</span>
      </label>

      <button type="submit" class="btn btn-primary auth-submit">Sign in</button>
    </form>

    <p class="auth-alt">
      New to TaskFlow? <a href="register.html">Create an account</a>
    </p>
  </div>

</main>


 <script type="module" src="../js/pages/auth.js"></script>

</body>
</html>
