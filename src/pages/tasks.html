<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tasks — TaskFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../dist/css/style.css">
</head>
<body>

<div class="app" data-sidebar-open="false">

  <div class="app-overlay" data-sidebar-close></div>

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <a href="index.html" class="navbar-brand sidebar-brand">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M2 17 C 7 17, 7 5, 12 5 C 17 5, 17 17, 20 17" stroke="#FFB454" stroke-width="1.6" fill="none"/>
          <circle cx="2" cy="17" r="1.8" fill="#7FE7C4"/>
          <circle cx="12" cy="5" r="1.8" fill="#F5F3EA"/>
          <circle cx="20" cy="17" r="1.8" fill="#FFB454"/>
        </svg>
        <span class="sidebar-label">TaskFlow</span>
      </a>

      <button class="sidebar-collapse" data-sidebar-collapse aria-label="Collapse sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-link" data-tooltip="Dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/>
          <rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>
        </svg>
        <span class="sidebar-label">Dashboard</span>
      </a>

      <a href="tasks.html" class="sidebar-link active" data-tooltip="My Tasks">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 6h11M9 12h11M9 18h11"/><path d="M4 6l1 1 2-2M4 12l1 1 2-2M4 18l1 1 2-2"/>
        </svg>
        <span class="sidebar-label">My Tasks</span>
      </a>

      <a href="kanban.html" class="sidebar-link" data-tooltip="Kanban">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="4" width="5" height="10" rx="1"/><rect x="17" y="4" width="4" height="13" rx="1"/>
        </svg>
        <span class="sidebar-label">Kanban</span>
      </a>

      <a href="calendar.html" class="sidebar-link" data-tooltip="Calendar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>
        </svg>
        <span class="sidebar-label">Calendar</span>
      </a>

      <a href="projects.html" class="sidebar-link" data-tooltip="Projects">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
        <span class="sidebar-label">Projects</span>
      </a>

      <a href="analytics.html" class="sidebar-link" data-tooltip="Analytics">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/>
        </svg>
        <span class="sidebar-label">Analytics</span>
      </a>

      <div class="sidebar-divider"></div>

      <a href="settings.html" class="sidebar-link" data-tooltip="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 6.6 19l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H2a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 4 6.6l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V2a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H22a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/>
        </svg>
        <span class="sidebar-label">Settings</span>
      </a>

      <a href="help.html" class="sidebar-link" data-tooltip="Help">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><path d="M12 17h.01"/>
        </svg>
        <span class="sidebar-label">Help</span>
      </a>
    </nav>

    <div class="sidebar-user">
      <div class="sidebar-avatar">AK</div>
      <div class="sidebar-label sidebar-user-info">
        <span class="sidebar-user-name">Alamgir Khan</span>
        <span class="sidebar-user-mail">you@company.com</span>
      </div>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="app-main">
    <header class="topbar">
      <button class="topbar-menu" data-sidebar-open aria-label="Open menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </button>
      <h1 class="topbar-title">My Tasks</h1>

      <div class="topbar-actions">
        <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark / light mode">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="app-content">

      <!-- toolbar: search + sort + new -->
      <div class="tasks-toolbar">
        <div class="tasks-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search tasks...">
        </div>
        <select class="sort-select" id="sortSelect">
          <option value="due">Sort: Due date</option>
          <option value="priority">Sort: Priority</option>
          <option value="name">Sort: Name (A–Z)</option>
        </select>
        <button class="btn btn-primary tasks-new" id="openModalBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#14100A" stroke-width="2.4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Task
        </button>
      </div>

      <!-- filters -->
      <div class="filter-row">
        <div class="status-tabs" id="statusTabs">
          <button data-s="all" class="active">All</button>
          <button data-s="todo">To Do</button>
          <button data-s="progress">In Progress</button>
          <button data-s="done">Done</button>
        </div>
        <div class="priority-chips" id="priorityChips">
          <button data-p="all" class="active">All priority</button>
          <button data-p="high">High</button>
          <button data-p="med">Medium</button>
          <button data-p="low">Low</button>
        </div>
      </div>

      <!-- task groups render here -->
      <div id="taskContainer"></div>

    </main>
  </div>

</div>

<!-- new-task modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>New task</h3>
    <div class="field">
      <label>Task name</label>
      <input type="text" id="mName" placeholder="e.g. Fix navbar overflow on mobile">
    </div>
    <div class="field">
      <label>Project</label>
      <input type="text" id="mProject" placeholder="e.g. TaskFlow Core">
    </div>
    <div class="field">
      <label>Priority</label>
      <select id="mPriority">
        <option value="high">High</option>
        <option value="med" selected>Medium</option>
        <option value="low">Low</option>
      </select>
    </div>
    <div class="field">
      <label>Due date</label>
      <input type="text" id="mDue" placeholder="e.g. Fri, 25 Jul">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="cancelModalBtn">Cancel</button>
      <button class="btn btn-primary" id="saveTaskBtn">Add task</button>
    </div>
  </div>
</div>

<script type="module" src="../js/pages/tasks.js"></script>
</body>
</html>
