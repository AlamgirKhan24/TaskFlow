<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../dist/css/style.css">
</head>
<body>

<div class="app" data-sidebar-open="false">

  <div class="app-overlay" data-sidebar-close></div>

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <a href="index.html" class="navbar-brand sidebar-brand">

          <path d="M2 17 C 7 17, 7 5, 12 5 C 17 5, 17 17, 20 17" stroke="#FFB454" stroke-width="1.6" fill="none"/>
          <circle cx="2" cy="17" r="1.8" fill="#7FE7C4"/>
          <circle cx="12" cy="5" r="1.8" fill="#F5F3EA"/>
          <circle cx="20" cy="17" r="1.8" fill="#FFB454"/>
        </svg>
        <span class="sidebar-label">TaskFlow</span>
      </a>

      <button class="sidebar-collapse" data-sidebar-collapse aria-label="Collapse sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-link" data-tooltip="Dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/>
          <rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>
        </svg>
        <span class="sidebar-label">Dashboard</span>
      </a>

      <a href="tasks.html" class="sidebar-link" data-tooltip="My Tasks">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 6h11M9 12h11M9 18h11"/><path d="M4 6l1 1 2-2M4 12l1 1 2-2M4 18l1 1 2-2"/>
        </svg>
        <span class="sidebar-label">My Tasks</span>
      </a>

      <a href="kanban.html" class="sidebar-link" data-tooltip="Kanban">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="4" width="5" height="10" rx="1"/><rect x="17" y="4" width="4" height="13" rx="1"/>
        </svg>
        <span class="sidebar-label">Kanban</span>
      </a>

      <a href="calendar.html" class="sidebar-link active" data-tooltip="Calendar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>
        </svg>
        <span class="sidebar-label">Calendar</span>
      </a>

      <a href="projects.html" class="sidebar-link" data-tooltip="Projects">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
        <span class="sidebar-label">Projects</span>
      </a>

      <a href="analytics.html" class="sidebar-link" data-tooltip="Analytics">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/>
        </svg>
        <span class="sidebar-label">Analytics</span>
      </a>

      <div class="sidebar-divider"></div>

      <a href="settings.html" class="sidebar-link" data-tooltip="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 6.6 19l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H2a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 4 6.6l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V2a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H22a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/>
        </svg>
        <span class="sidebar-label">Settings</span>
      </a>

      <a href="help.html" class="sidebar-link" data-tooltip="Help">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><path d="M12 17h.01"/>
        </svg>
        <span class="sidebar-label">Help</span>
      </a>
    </nav>

    <div class="sidebar-user">
      <div class="sidebar-avatar">AK</div>
      <div class="sidebar-label sidebar-user-info">
        <span class="sidebar-user-name">Alamgir Khan</span>
        <span class="sidebar-user-mail">you@company.com</span>
      </div>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="app-main">
    <header class="topbar">
      <button class="topbar-menu" data-sidebar-open aria-label="Open menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </button>
      <h1 class="topbar-title">Calendar</h1>

      <div class="topbar-actions">
        <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark / light mode">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="app-content">

      <!-- month header: eyebrow + month/year + nav + add-event -->
      <div class="calendar-head">
        <div>
          <div class="dash-eyebrow">Workspace / TaskFlow</div>
          <h2 class="calendar-title" id="calMonthLabel">Month Year</h2>
        </div>

        <div class="calendar-controls">
          <div class="calendar-nav">
            <button class="cal-nav-btn" id="prevMonthBtn" aria-label="Previous month">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <button class="cal-today-btn" id="todayBtn">Today</button>
            <button class="cal-nav-btn" id="nextMonthBtn" aria-label="Next month">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          </div>
          <button class="btn btn-primary cal-add-btn" id="addEventBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            Add event
          </button>
        </div>
      </div>

      <!-- ===== two-column layout: grid + side panel ===== -->
      <div class="calendar-layout">

        <div class="calendar-main">
          <!-- weekday header row -->
          <div class="weekday-row">
            <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
          </div>

          <!-- month grid, built by calendar.js -->
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <aside class="calendar-side">

          <!-- ===== today hero card ===== -->
          <div class="today-card">
            <div class="today-date-badge">
              <span class="today-daynum" id="todayDayNum">--</span>
              <span class="today-weekday" id="todayWeekday">---</span>
            </div>
            <div class="today-info">
              <div class="today-label">Today</div>
              <div class="today-full" id="todayFullDate">Loading…</div>
              <div class="today-count" id="todayCount">0 events</div>
            </div>
          </div>

          <!-- ===== legend ===== -->
          <div class="side-panel">
            <div class="side-panel-title">Categories</div>
            <div class="legend-list">
              <div class="legend-row"><span class="legend-dot work"></span> Work <span class="legend-count" id="legendWork">0</span></div>
              <div class="legend-row"><span class="legend-dot meeting"></span> Meeting <span class="legend-count" id="legendMeeting">0</span></div>
              <div class="legend-row"><span class="legend-dot personal"></span> Personal <span class="legend-count" id="legendPersonal">0</span></div>
              <div class="legend-row"><span class="legend-dot deadline"></span> Deadline <span class="legend-count" id="legendDeadline">0</span></div>
            </div>
          </div>

          <!-- ===== upcoming events ===== -->
          <div class="side-panel upcoming-panel">
            <div class="side-panel-title">Upcoming</div>
            <div class="upcoming-list" id="upcomingList"></div>
          </div>

        </aside>

      </div>

    </main>
  </div>

</div>

<!-- ============ DAY MODAL (view + add events for one day) ============ -->
<div class="modal-overlay" id="dayModalOverlay">
  <div class="modal cal-modal">
    <h3 id="dayModalTitle">Events</h3>

    <div class="day-event-list" id="dayEventList"></div>

    <div class="cal-modal-divider"></div>

    <div class="field">
      <label>Event title</label>
      <input type="text" id="eName" placeholder="e.g. Client sync call">
    </div>
    <div class="field">
      <label>Time (optional)</label>
      <input type="text" id="eTime" placeholder="e.g. 3:00 PM">
    </div>
    <div class="field">
      <label>Category</label>
      <div class="category-picker" id="eCategoryPicker">
        <button type="button" class="cat-pill work active" data-cat="work">Work</button>
        <button type="button" class="cat-pill meeting" data-cat="meeting">Meeting</button>
        <button type="button" class="cat-pill personal" data-cat="personal">Personal</button>
        <button type="button" class="cat-pill deadline" data-cat="deadline">Deadline</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-outline" id="cancelDayModalBtn">Close</button>
      <button class="btn btn-primary" id="saveEventBtn">Add event</button>
    </div>
  </div>
</div>

<script type="module" src="../js/pages/calendar.js"></script>
</body>
</html>
