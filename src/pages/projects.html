<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — TaskFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../dist/css/style.css">
</head>
<body>

<div class="app" data-sidebar-open="false">

  <div class="app-overlay" data-sidebar-close></div>

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <a href="index.html" class="navbar-brand sidebar-brand">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M2 17 C 7 17, 7 5, 12 5 C 17 5, 17 17, 20 17" stroke="#FFB454" stroke-width="1.6" fill="none"/>
          <circle cx="2" cy="17" r="1.8" fill="#7FE7C4"/>
          <circle cx="12" cy="5" r="1.8" fill="#F5F3EA"/>
          <circle cx="20" cy="17" r="1.8" fill="#FFB454"/>
        </svg>
        <span class="sidebar-label">TaskFlow</span>
      </a>

      <button class="sidebar-collapse" data-sidebar-collapse aria-label="Collapse sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-link" data-tooltip="Dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/>
          <rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>
        </svg>
        <span class="sidebar-label">Dashboard</span>
      </a>

      <a href="tasks.html" class="sidebar-link" data-tooltip="My Tasks">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 6h11M9 12h11M9 18h11"/><path d="M4 6l1 1 2-2M4 12l1 1 2-2M4 18l1 1 2-2"/>
        </svg>
        <span class="sidebar-label">My Tasks</span>
      </a>

      <a href="kanban.html" class="sidebar-link" data-tooltip="Kanban">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="4" width="5" height="10" rx="1"/><rect x="17" y="4" width="4" height="13" rx="1"/>
        </svg>
        <span class="sidebar-label">Kanban</span>
      </a>

      <a href="calendar.html" class="sidebar-link" data-tooltip="Calendar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>
        </svg>
        <span class="sidebar-label">Calendar</span>
      </a>

      <a href="projects.html" class="sidebar-link active" data-tooltip="Projects">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
        <span class="sidebar-label">Projects</span>
      </a>

      <a href="analytics.html" class="sidebar-link" data-tooltip="Analytics">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/>
        </svg>
        <span class="sidebar-label">Analytics</span>
      </a>

      <div class="sidebar-divider"></div>

      <a href="settings.html" class="sidebar-link" data-tooltip="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 6.6 19l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H2a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 4 6.6l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V2a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H22a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/>
        </svg>
        <span class="sidebar-label">Settings</span>
      </a>

      <a href="help.html" class="sidebar-link" data-tooltip="Help">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><path d="M12 17h.01"/>
        </svg>
        <span class="sidebar-label">Help</span>
      </a>
    </nav>

    <div class="sidebar-user">
      <div class="sidebar-avatar">AK</div>
      <div class="sidebar-label sidebar-user-info">
        <span class="sidebar-user-name">Alamgir Khan</span>
        <span class="sidebar-user-mail">you@company.com</span>
      </div>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="app-main">
    <header class="topbar">
      <button class="topbar-menu" data-sidebar-open aria-label="Open menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </button>
      <h1 class="topbar-title">Projects</h1>

      <div class="topbar-actions">
        <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark / light mode">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="app-content">

      <div class="proj-head">
        <div class="dash-eyebrow">Workspace / TaskFlow</div>
        <h2 class="proj-title">Projects</h2>
      </div>

      <!-- ===== stats row ===== -->
      <div class="proj-stats">
        <div class="proj-stat">
          <div class="proj-stat-icon total">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
          </div>
          <div>
            <div class="proj-stat-num" id="statTotal">0</div>
            <div class="proj-stat-label">Total Projects</div>
          </div>
        </div>
        <div class="proj-stat">
          <div class="proj-stat-icon active">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h7l-1 8 11-14h-7z"/></svg>
          </div>
          <div>
            <div class="proj-stat-num" id="statActive">0</div>
            <div class="proj-stat-label">Active</div>
          </div>
        </div>
        <div class="proj-stat">
          <div class="proj-stat-icon done">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <div>
            <div class="proj-stat-num" id="statCompleted">0</div>
            <div class="proj-stat-label">Completed</div>
          </div>
        </div>
        <div class="proj-stat">
          <div class="proj-stat-icon hold">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
          </div>
          <div>
            <div class="proj-stat-num" id="statHold">0</div>
            <div class="proj-stat-label">On Hold</div>
          </div>
        </div>
      </div>

      <!-- ===== toolbar: search + status filter + new project ===== -->
      <div class="proj-toolbar">
        <div class="tasks-search proj-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="projSearch" placeholder="Search projects…">
        </div>

        <div class="status-tabs" id="statusTabs">
          <button class="active" data-status="all">All</button>
          <button data-status="active">Active</button>
          <button data-status="completed">Completed</button>
          <button data-status="onhold">On Hold</button>
        </div>

        <button class="btn btn-primary proj-new-btn" id="newProjectBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          New project
        </button>
      </div>

      <!-- ===== projects grid, built by projects.js ===== -->
      <div class="proj-grid" id="projGrid"></div>

      <div class="proj-empty" id="projEmpty" style="display:none;">No projects match your search.</div>

    </main>
  </div>

</div>

<!-- ============ NEW / EDIT PROJECT MODAL ============ -->
<div class="modal-overlay" id="projModalOverlay">
  <div class="modal proj-modal">
    <h3 id="projModalTitle">New project</h3>

    <div class="field">
      <label>Project name</label>
      <input type="text" id="pName" placeholder="e.g. Website Redesign">
    </div>
    <div class="field">
      <label>Description</label>
      <input type="text" id="pDesc" placeholder="Short summary of the project">
    </div>
    <div class="field">
      <label>Status</label>
      <div class="category-picker" id="pStatusPicker">
        <button type="button" class="cat-pill status-active active" data-status="active">Active</button>
        <button type="button" class="cat-pill status-onhold" data-status="onhold">On Hold</button>
        <button type="button" class="cat-pill status-completed" data-status="completed">Completed</button>
      </div>
    </div>
    <div class="field">
      <label>Due date</label>
      <input type="text" id="pDue" placeholder="e.g. Aug 30">
    </div>

    <div class="modal-actions">
      <button class="btn btn-outline" id="cancelProjModalBtn">Cancel</button>
      <button class="btn btn-primary" id="saveProjectBtn">Save project</button>
    </div>
  </div>
</div>

<script type="module" src="../js/pages/projects.js"></script>
</body>
</html>
